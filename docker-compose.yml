version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: calculator-db
    environment:
      POSTGRES_DB: calculator
      POSTGRES_USER: calculator
      POSTGRES_PASSWORD: calculator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calculator -d calculator"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: calculator-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/calculator
      SPRING_DATASOURCE_USERNAME: calculator
      SPRING_DATASOURCE_PASSWORD: calculator
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/calculate?a=1&b=1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
