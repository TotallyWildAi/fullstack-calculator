# PostgreSQL database configuration for production/development
spring.datasource.url=jdbc:postgresql://localhost:5432/calculator
spring.datasource.username=calculator
spring.datasource.password=calculator
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.hbm2ddl.import_files=import.sql

# Actuator configuration - expose only health endpoint
management.endpoints.web.exposure.include=health
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized

# SpringDoc OpenAPI configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS configuration - allowed origins (comma-separated list)
app.cors.allowed-origins=http://localhost:5173
